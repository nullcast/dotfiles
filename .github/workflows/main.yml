name: Dotfiles CI

# Lint the dotfiles on every push/PR.
# (Running the full `make` would need sudo and would install GUI apps,
#  so CI only validates that the scripts and fish configs are well-formed.)
on:
  push:
    branches: [ main ]
  pull_request:

jobs:
  lint:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Lint shell scripts (errors only)
        run: |
          brew install shellcheck
          shellcheck --severity=error \
            .bin/init.sh .bin/link.sh .bin/defaults.sh .bin/brew.sh \
            tools/*.sh

      - name: Check fish syntax
        run: |
          brew install fish
          status=0
          while IFS= read -r f; do
            echo "fish --no-execute $f"
            fish --no-execute "$f" || status=1
          done < <(find .bin/.config/fish -name '*.fish')
          exit $status
